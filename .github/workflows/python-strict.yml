name: Python strict

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-strict-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.10.0"
          python-version: "3.12"
          enable-cache: true

      - name: Install the locked quality environment
        run: uv sync --project quality --python 3.12 --frozen

      - name: Run every fail-closed Python gate
        run: uv run --project quality --python 3.12 --frozen check
